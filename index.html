<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ending Merch - Tienda Oficial</title>
    <style>
        /* Fondo negro base y polvo de estrellas */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0214; 
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(rgba(157, 23, 248, 0.3), transparent 50px);
            background-size: 550px 550px, 350px 350px, 300px 300px;
            background-position: 0 0, 40px 60px, 150px 150px;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Cabecera principal con destello morado */
        header {
            text-align: center;
            padding: 50px 20px 20px 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            color: #ffffff;
            text-shadow: 0 0 15px #9d17f8, 0 0 30px #9d17f8;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        p.slogan {
            color: #bfa3ff;
            font-size: 1.2rem;
            margin: 0;
            text-shadow: 0 0 8px rgba(157, 23, 248, 0.5);
        }

        /* Contenedor de productos (Cuadrícula de 4 elementos) */
        .tienda-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: block;
            text-align: center;
        }

        /* Tarjeta de Producto con borde iluminado */
        .producto-card {
            background: rgba(18, 9, 32, 0.75);
            border: 2px solid #3d1466;
            border-radius: 16px;
            padding: 25px;
            margin: 15px;
            width: 260px;
            display: inline-block;
            vertical-align: top;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
        }

        /* Efecto de destello al pasar el ratón */
        .producto-card:hover {
            transform: translateY(-5px);
            border-color: #9d17f8;
            box-shadow: 0 0 25px rgba(157, 23, 248, 0.7);
        }

        /* Contenedor de la prenda simulada */
        .prenda-mockup {
            width: 100%;
            height: 220px;
            background: #14111a;
            border-radius: 12px;
            margin-bottom: 20px;
            position: relative;
            border: 1px solid #2d1f42;
            overflow: hidden;
        }

        /* Representación de la prenda negra de fondo */
        .prenda-base {
            width: 80%;
            height: 80%;
            background: #000000;
            margin: 10% auto;
            border-radius: 8px;
            border: 1px solid #222;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
            display: table;
        }

        /* Espacio exacto para tu logo en el centro de la prenda */
        .logo-contenedor {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            padding: 10px;
        }

        .logo-contenedor img {
            max-width: 90px;
            max-height: 90px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(157, 23, 248, 0.5));
        }

        .producto-card h3 {
            margin: 10px 0 5px 0;
            font-size: 1.25rem;
            color: #ffffff;
        }

        .descripcion {
            font-size: 0.9rem;
            color: #8c7bba;
            margin: 0 0 15px 0;
        }

        .precio {
            font-size: 1.5rem;
            color: #d1b3ff;
            font-weight: bold;
            margin: 10px 0 20px 0;
            text-shadow: 0 0 5px rgba(209, 179, 255, 0.3);
        }

        /* Botón estilo morado brillante */
        .btn-comprar {
            background-color: #9d17f8;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 10px #9d17f8;
            transition: background-color 0.3s, box-shadow 0.3s, transform 0.1s;
        }

        .btn-comprar:hover {
            background-color: #b142ff;
            box-shadow: 0 0 20px #b142ff, 0 0 30px #9d17f8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Ending Merch</h1>
        <p class="slogan">Colección Oficial con Destellos Morados</p>
    </header>

    <main class="tienda-container">
        
        <div class="producto-card">
            <div class="prenda-mockup">
                <div class="prenda-base">
                    <div class="logo-contenedor">
                        <img src="Logo YT.png" alt="Logo Ending">
                    </div>
                </div>
            </div>
            <h3>Camisa Ending</h3>
            <p class="descripcion">Negra con logo central</p>
            <div class="precio">10,99€</div>
            <button class="btn-comprar">Comprar</button>
        </div>

        <div class="producto-card">
            <div class="prenda-mockup">
                <div class="prenda-base">
                    <div class="logo-contenedor">
                        <img src="Logo YT.png" alt="Logo Ending">
                    </div>
                </div>
            </div>
            <h3>Camiseta Ending</h3>
            <p class="descripcion">Negra con logo central</p>
            <div class="precio">14,99€</div>
            <button class="btn-comprar">Comprar</button>
        </div>

        <div class="producto-card">
            <div class="prenda-mockup">
                <div class="prenda-base">
                    <div class="logo-contenedor">
                        <img src="Logo YT.png" alt="Logo Ending">
                    </div>
                </div>
            </div>
            <h3>Polo Ending</h3>
            <p class="descripcion">Negro con logo central</p>
            <div class="precio">15,99€</div>
            <button class="btn-comprar">Comprar</button>
        </div>

        <div class="producto-card">
            <div class="prenda-mockup">
                <div class="prenda-base">
                    <div class="logo-contenedor">
                        <img src="Logo YT.png" alt="Logo Ending">
                    </div>
                </div>
            </div>
            <h3>Sudadera con Capucha</h3>
            <p class="descripcion">Negra con logo central</p>
            <div class="precio">17,99€</div>
            <button class="btn-comprar">Comprar</button>
        </div>

    </main>

</body>
</html>
