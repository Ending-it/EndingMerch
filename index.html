<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ending Merch - Tienda Oficial</title>
    <style>
        /* Fondo negro base y tipografía limpia */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0214; /* Un negro con un ligerísimo matiz morado de fondo */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(rgba(157, 23, 248, 0.4), transparent 40%);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Cabecera principal con destello morado text-shadow */
        header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            color: #ffffff;
            text-shadow: 0 0 10px #9d17f8, 0 0 25px #9d17f8, 0 0 50px #9d17f8;
            letter-spacing: 2px;
        }

        /* Menú de navegación simple */
        nav {
            margin-top: 15px;
        }

        nav a {
            color: #bfa3ff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1rem;
            transition: color 0.3s, text-shadow 0.3s;
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #9d17f8;
        }

        /* Contenedor de productos */
        .tienda-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        /* Tarjeta de Producto con borde iluminado */
        .producto-card {
            background: rgba(20, 10, 35, 0.7);
            border: 2px solid #3d1466;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(5px);
        }

        /* Efecto de destello al pasar el ratón por la tarjeta */
        .producto-card:hover {
            transform: translateY(-5px);
            border-color: #9d17f8;
            box-shadow: 0 0 25px rgba(157, 23, 248, 0.6);
        }

        /* Marcador de posición para las fotos de tus productos */
        .producto-imagen {
            width: 100%;
            height: 220px;
            background: #1a1523;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5d4d7a;
            font-weight: bold;
            border: 1px dashed #4a3663;
        }

        .producto-card h3 {
            margin: 10px 0;
            font-size: 1.3rem;
            color: #ffffff;
        }

        .precio {
            font-size: 1.4rem;
            color: #d1b3ff;
            font-weight: bold;
            margin: 10px 0 20px 0;
        }

        /* Botón estilo "Add to Cart" morado brillante */
        .btn-comprar {
            background-color: #9d17f8;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 10px #9d17f8;
            transition: background-color 0.3s, box-shadow 0.3s, transform 0.1s;
        }

        .btn-comprar:hover {
            background-color: #b142ff;
            box-shadow: 0 0 20px #b142ff, 0 0 30px #9d17f8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Ending Merch</h1>
        <nav>
            <a href="#">Shop</a>
            <a href="#">New Arrivals</a>
            <a href="#">About</a>
            <a href="#">Cart 🛒</a>
        </nav>
    </header>

    <main class="tienda-container">
        
        <!-- Producto 1 -->
        <div class="producto-card">
            <div class="producto-imagen"> [ Camiseta Classic ] </div>
            <h3>Ending-it Classic Tee</h3>
            <div class="precio">34.99 USD</div>
            <button class="btn-comprar">Add to Cart</button>
        </div>

        <!-- Producto 2 -->
        <div class="producto-card">
            <div class="producto-imagen"> [ Sudadera Purple ] </div>
            <h3>Purple Star Dust Hoodie</h3>
            <div class="precio">34.99 USD</div>
            <button class="btn-comprar">Add to Cart</button>
        </div>

        <!-- Producto 3 -->
        <div class="producto-card">
            <div class="producto-imagen"> [ Gorra Ending ] </div>
            <h3>Ending-it Smasher Cap</h3>
            <div class="precio">34.99 USD</div>
            <button class="btn-comprar">Add to Cart</button>
        </div>

    </main>

</body>
</html>
